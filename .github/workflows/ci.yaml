name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        pg-version: [ 14, 15, 16, 17]
      fail-fast: false

    env:
      PG_VER: ${{ matrix.pg-version }}
      PG_BIN: /usr/lib/postgresql/${{ matrix.pg-version }}/bin

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pg${{ matrix.pg-version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-pg${{ matrix.pg-version }}-

      - name: Install PostgreSQL ${{ env.PG_VER }} APT repository and system dependencies
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          echo "----- Install system dependencies -----"
          sudo apt-get install -y \
            libreadline-dev \
            zlib1g-dev \
            flex \
            bison \
            build-essential \
            clang \
            llvm \
            ca-certificates \
            redis-tools \
            docker-compose
          echo ""
          sudo apt-get install -y postgresql-${{ env.PG_VER }} postgresql-server-dev-${{ env.PG_VER }}

      - name: Start Redis container
        run: docker run -d --name redis-server -p 8899:6379 redis

      - name: Start Redis Cluster for testing
        run: |
          chmod +x ./scripts/start-redis-cluster.sh
          ./scripts/start-redis-cluster.sh

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version 0.16.1

      - name: Initialize pgrx for PostgreSQL ${{ env.PG_VER }}
        run: cargo pgrx init --pg${{ env.PG_VER }} ${{ env.PG_BIN }}/pg_config

      - name: Report versions
        run: |
          cargo --version
          ${{ env.PG_BIN }}/pg_config --version

      - name: Chmod pg_config
        run: |
          sudo chmod 777 /usr/share/postgresql/${{ env.PG_VER }} -R
          sudo chmod 777 /usr/lib/postgresql/${{ env.PG_VER }} -R

      - name: Run clippy
        run: cargo clippy --no-default-features --all-targets --features pg${{ env.PG_VER }} -- -D warnings -A clippy::enum-variant-names

      - name: Run Tests for PostgreSQL ${{ env.PG_VER }}
        env:
          REDIS_CLUSTER_NODES: "127.0.0.1:7001,127.0.0.1:7002,127.0.0.1:7003,127.0.0.1:7004,127.0.0.1:7005,127.0.0.1:7006"
        run: |
          echo "Running standard tests..."
          cargo pgrx test --release pg${{ env.PG_VER }}

      - name: Package for PostgreSQL ${{ env.PG_VER }}
        run: cargo pgrx package --pg-config=${{ env.PG_BIN }}/pg_config

      - name: Cleanup Redis Cluster
        if: always()
        run: |
          docker ps -a --filter "name=redis-cluster-test" --format "{{.Names}}" | xargs -r docker rm -f || true
          docker rm -f redis-server || true
          echo "Cleanup completed"

  coverage:
    runs-on: ubuntu-latest
    env:
      PG_VER: 14
      PG_BIN: /usr/lib/postgresql/14/bin

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL 14 and system dependencies
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang llvm libreadline-dev zlib1g-dev \
            postgresql-14 postgresql-server-dev-14 \
            redis-tools docker-compose

      - name: Start Redis container
        run: docker run -d --name redis-server -p 8899:6379 redis

      - name: Install Rust toolchain with llvm-tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-pgrx and coverage tools
        run: |
          cargo install cargo-pgrx --version 0.16.1
          cargo install grcov

      - name: Initialize pgrx for PostgreSQL 14
        run: cargo pgrx init --pg14 ${{ env.PG_BIN }}/pg_config

      - name: Chmod pg_config
        run: |
          sudo chmod 777 /usr/share/postgresql/14 -R
          sudo chmod 777 /usr/lib/postgresql/14 -R

      - name: Run tests with coverage instrumentation
        env:
          LLVM_PROFILE_FILE: "redis-fdw-%p-%m.profraw"
          RUSTFLAGS: "-C instrument-coverage"
        run: cargo pgrx test pg14
        continue-on-error: true

      - name: Generate coverage report
        run: |
          grcov . -s . --binary-path ./target/debug/ -t cobertura --branch --ignore-not-existing --ignore "/*" --ignore "target/*" -o cobertura.xml
        continue-on-error: true

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: cobertura.xml
          fail_ci_if_error: false
