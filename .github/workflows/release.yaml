name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        pg-version: [14, 15, 16, 17]
      fail-fast: false

    env:
      PG_VER: ${{ matrix.pg-version }}
      PG_BIN: /usr/lib/postgresql/${{ matrix.pg-version }}/bin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pg${{ matrix.pg-version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-pg${{ matrix.pg-version }}-

      - name: Install PostgreSQL ${{ env.PG_VER }} and dev headers
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            llvm \
            libreadline-dev \
            zlib1g-dev \
            postgresql-${{ env.PG_VER }} \
            postgresql-server-dev-${{ env.PG_VER }}

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version 0.16.1

      - name: Initialize pgrx
        run: cargo pgrx init --pg${{ env.PG_VER }} ${{ env.PG_BIN }}/pg_config

      - name: Set permissions
        run: |
          sudo chmod 777 /usr/share/postgresql/${{ env.PG_VER }} -R
          sudo chmod 777 /usr/lib/postgresql/${{ env.PG_VER }} -R

      - name: Package extension
        run: cargo pgrx package --pg-config=${{ env.PG_BIN }}/pg_config

      - name: Prepare release artifact
        run: |
          ARTIFACT_DIR="redis_fdw_rs-pg${{ env.PG_VER }}-$(echo ${{ github.ref_name }})"
          mkdir -p "${ARTIFACT_DIR}"
          cp -r target/release/redis_fdw_rs-pg${{ env.PG_VER }}/* "${ARTIFACT_DIR}/" 2>/dev/null || \
          cp -r target/release/redis_fdw_rs-pg${{ env.PG_VER }}/ "${ARTIFACT_DIR}/" 2>/dev/null || true
          tar czf "redis_fdw_rs-pg${{ env.PG_VER }}-${{ github.ref_name }}-linux-amd64.tar.gz" "${ARTIFACT_DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: redis_fdw_rs-pg${{ matrix.pg-version }}
          path: "*.tar.gz"

  create-release:
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Redis FDW ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: artifacts/**/*.tar.gz
