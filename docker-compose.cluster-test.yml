# Redis Cluster Docker Compose for Integration Testing
# Uses host network so cluster nodes announce 127.0.0.1 and are directly reachable from tests.
# Usage: docker compose -f docker-compose.cluster-test.yml up -d --wait

services:
  redis-standalone:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: redis-server
    network_mode: host
    command: redis-server --port 8899 --bind 0.0.0.0 --protected-mode no --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "8899", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis-cluster-1:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: redis-cluster-test-1
    network_mode: host
    command: >
      redis-server
      --port 7001
      --cluster-enabled yes
      --cluster-config-file nodes-1.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --bind 0.0.0.0
      --protected-mode no
      --save ""
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7001
      --cluster-announce-bus-port 17001
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7001", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis-cluster-2:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: redis-cluster-test-2
    network_mode: host
    command: >
      redis-server
      --port 7002
      --cluster-enabled yes
      --cluster-config-file nodes-2.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --bind 0.0.0.0
      --protected-mode no
      --save ""
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7002
      --cluster-announce-bus-port 17002
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7002", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis-cluster-3:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: redis-cluster-test-3
    network_mode: host
    command: >
      redis-server
      --port 7003
      --cluster-enabled yes
      --cluster-config-file nodes-3.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --bind 0.0.0.0
      --protected-mode no
      --save ""
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7003
      --cluster-announce-bus-port 17003
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7003", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis-cluster-4:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: redis-cluster-test-4
    network_mode: host
    command: >
      redis-server
      --port 7004
      --cluster-enabled yes
      --cluster-config-file nodes-4.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --bind 0.0.0.0
      --protected-mode no
      --save ""
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7004
      --cluster-announce-bus-port 17004
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7004", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis-cluster-5:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: redis-cluster-test-5
    network_mode: host
    command: >
      redis-server
      --port 7005
      --cluster-enabled yes
      --cluster-config-file nodes-5.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --bind 0.0.0.0
      --protected-mode no
      --save ""
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7005
      --cluster-announce-bus-port 17005
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7005", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis-cluster-6:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: redis-cluster-test-6
    network_mode: host
    command: >
      redis-server
      --port 7006
      --cluster-enabled yes
      --cluster-config-file nodes-6.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --bind 0.0.0.0
      --protected-mode no
      --save ""
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7006
      --cluster-announce-bus-port 17006
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7006", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  # Cluster init: waits for all nodes healthy, then forms the cluster
  redis-cluster-init:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: redis-cluster-test-init
    network_mode: host
    depends_on:
      redis-cluster-1:
        condition: service_healthy
      redis-cluster-2:
        condition: service_healthy
      redis-cluster-3:
        condition: service_healthy
      redis-cluster-4:
        condition: service_healthy
      redis-cluster-5:
        condition: service_healthy
      redis-cluster-6:
        condition: service_healthy
    command: >
      sh -c "echo yes | redis-cli --cluster create
      127.0.0.1:7001 127.0.0.1:7002 127.0.0.1:7003
      127.0.0.1:7004 127.0.0.1:7005 127.0.0.1:7006
      --cluster-replicas 1"
    restart: "no"
